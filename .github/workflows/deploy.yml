name: Deploy
on:
  push:
    # Sequence of patterns matched against refs/heads
    branches:
      - dev

permissions:
  actions: read
  contents: read

jobs:
  debug:
    uses: ./.github/workflows/dev.yml
    secrets: inherit
  deploy:
    needs: debug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact
      - name: Read Gist Metadata
        id: gist_metadata
        run: |
          node <<'EOF'
          const fs = require("node:fs");

          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const name = typeof packageJson.name === "string" ? packageJson.name : "";
          const description = typeof packageJson.description === "string" ? packageJson.description : "";
          const gistDescription = `${name}\n${description}`;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `GIST_DESCRIPTION<<GIST_DESCRIPTION_EOF\n${gistDescription}\nGIST_DESCRIPTION_EOF\n`);
          EOF
      - name: Deploy Request Bundle to Gist
        uses: exuanbo/actions-deploy-gist@main
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ vars.GIST_ID }}
          gist_description: ${{ vars.GIST_DESCRIPTION || steps.gist_metadata.outputs.GIST_DESCRIPTION }}
          file_path: dist/request.bundle.js
      - name: Deploy Response Bundle to Gist
        uses: exuanbo/actions-deploy-gist@main
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ vars.GIST_ID }}
          gist_description: ${{ vars.GIST_DESCRIPTION || steps.gist_metadata.outputs.GIST_DESCRIPTION }}
          file_path: dist/response.bundle.js
